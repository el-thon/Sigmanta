services:
  db:
    image: postgis/postgis:16-3.4
    container_name: sigmanta-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sigmanta
      POSTGRES_PASSWORD: sigmanta
      POSTGRES_DB: sigmanta
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sigmanta -d sigmanta"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: node:22-alpine
    container_name: sigmanta-app
    working_dir: /app
    command: sh -c "npm install && npx prisma generate && npx prisma db push && npm run prisma:seed && npm run dev -- --hostname 0.0.0.0"
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://sigmanta:sigmanta@db:5432/sigmanta?schema=public
      JWT_SECRET: change-this-secret-in-production
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_BUCKET: ${R2_BUCKET}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-/api/storage}
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  node_modules:
  next_cache:
